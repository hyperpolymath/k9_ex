#
# k9iser manifest for k9_ex
# K9 Elixir implementation — Mix-based parser and validator for the K9 contract format

[project]
name = "k9_ex"
safety_tier = "hunt"

[[source]]
path = "mix.exs"
type = "mix"
output = "generated/k9iser/mix-project.k9"

[[source]]
path = "Justfile"
type = "justfile"
output = "generated/k9iser/justfile-recipes.k9"

[[constraint]]
rule = "build.dependencies has no banned_packages"
severity = "error"
